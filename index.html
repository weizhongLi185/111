<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股成本計算器</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 500px;
    margin: auto;
    padding: 20px;
    font-size: 18px;
}

h2 {
    text-align: center;
}

label {
    display: block;
    margin-top: 10px;
}

input,
select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    font-size: 16px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    font-size: 16px;
    cursor: pointer;
}

#result {
    margin-top: 20px;
    line-height: 1.8;
    background: #f5f5f5;
    padding: 15px;
    border-radius: 8px;
}
</style>
</head>

<body>

<h2>台股成本計算器</h2>

<label>類型</label>
<select id="type">
    <option value="stock">股票</option>
    <option value="daytrade">當沖</option>
    <option value="etf">ETF</option>
</select>

<label>股數</label>
<input type="number" id="shares" min="1" step="1">

<label>單位</label>
<select id="unit">
    <option value="share">股</option>
    <option value="lot">張</option>
</select>

<label>股價</label>
<input type="number" id="price" min="0.01" step="0.01">
<label>手續費折扣（折）</label>
<input type="number" id="discount" min="0.1" max="10" step="0.1" value="10">   

<button onclick="calculate()">計算</button>
<button onclick="clearAll()">清除</button>

<div id="result"></div>

<script>

// 無條件捨去
function floorNumber(num, digits = 2) {
    const factor = Math.pow(10, digits);
    return Math.floor(num * factor) / factor;
}

// 千分位格式
function format(num, digits = 0) {
    return Number(num).toLocaleString("zh-TW", {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
    });
}

function calculate() {

    const type = document.getElementById("type").value;
    const unit = document.getElementById("unit").value;

    const inputQty = parseFloat(
        document.getElementById("shares").value
    );

    let shares = inputQty;

    const price = parseFloat(
        document.getElementById("price").value
    );

    if (unit === "lot") {
        shares *= 1000;
    }

    if (
    isNaN(inputQty) ||
    isNaN(price) ||
    isNaN(discount) ||
    inputQty <= 0 ||
    price <= 0 ||
    discount <= 0
) {
    document.getElementById("result").innerHTML =
        "請輸入正確資料";
    return;
} {
        document.getElementById("result").innerHTML =
            "請輸入正確資料";
        return;
    }

    const total = shares * price;

    const discount = parseFloat(
    document.getElementById("discount").value
);

let fee = total * 0.001425 * (discount / 10);
fee = Math.max(1, Math.floor(fee));

    const cost = total + fee;

    const avg = floorNumber(cost / shares, 2);

    let typeText = "股票";

    if (type === "daytrade") {
        typeText = "當沖";
    } else if (type === "etf") {
        typeText = "ETF";
    }

    document.getElementById("result").innerHTML = `
        <b>類型：</b>${typeText}<br>
        <b>數量：</b>${format(inputQty)} ${unit === "lot" ? "張" : "股"}<br>
        <b>股價：</b>${format(price, 2)} 元<br>
        <b>成交金額：</b>${format(total)} 元<br>
        <b>手續費：</b>${format(fee)} 元<br>
        <b>手續費折扣：</b>${discount} 折<br>
        <b>總成本：</b>${format(cost)} 元<br>
        <b>平均成本：</b>${format(avg, 2)} 元／股
    `;
}

function clearAll() {
    document.getElementById("shares").value = "";
    document.getElementById("price").value = "";
    document.getElementById("type").value = "stock";
    document.getElementById("unit").value = "share";
    document.getElementById("result").innerHTML = "";
}

</script>

</body>
</html>
