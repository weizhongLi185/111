<!DOCTYPE html>
<html lang="zh-Hant">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股成本計算器</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 500px;
    margin: auto;
    padding: 20px;
    font-size: 18px;
}

h2 {
    text-align: center;
}

label {
    display: block;
    margin-top: 10px;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    font-size: 16px;
    cursor: pointer;
}

#result {
    margin-top: 20px;
    line-height: 1.8;
    background: #f5f5f5;
    padding: 15px;
    border-radius: 8px;
}
</style>
</head>

<body>

<h2>台股成本計算器</h2>

<label>類型</label>
<select id="type">
    <option value="stock">股票</option>
    <option value="daytrade">當沖</option>
    <option value="etf">ETF</option>
</select>

<label>股數</label>
<input type="text" id="shares" oninput="formatInput(this)">

<label>股價</label>
<input type="text" id="price" oninput="formatInput(this)">

<button onclick="calculate()">計算</button>
<button onclick="clearAll()">清除</button>

<div id="result"></div>

<script>
// 無條件捨去
function floor(num, digits = 2) {
    const factor = Math.pow(10, digits);
    return Math.floor(num * factor) / factor;
}

// ⭐ 千分位 + 小數控制
function format(num, digits = 0) {
    return num.toLocaleString('zh-TW', {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
    });
}

function calculate() {
    const type = document.getElementById("type").value;
const shares = parseFloat(document.getElementById("shares").value.replace(/,/g, ""));
const price = parseFloat(document.getElementById("price").value.replace(/,/g, ""));
     if (isNaN(shares) || isNaN(price))｛
        document.getElementById("result").innerHTML = "請輸入完整數值";
        return;
    }

    const total = shares * price;

    // 手續費
    let fee = total * 0.001425;
    fee = Math.max(1, floor(fee, 0));

    const cost = total + fee;

    // 平均成本
    const avg = floor(cost / shares, 2）；

    let typeText = "";
    if (type === "stock") typeText = "股票";
    if (type === "daytrade") typeText = "當沖";
    if (type === "etf") typeText = "ETF";

    document.getElementById("result").innerHTML = `
        <b>類型：</b> ${typeText}<br>
        <b>成交金額：</b> ${format(total, 2)} 元<br>
        <b>手續費：</b> ${format(fee, 0)} 元<br>
        <b>總成本：</b> ${format(cost, 2)} 元<br>
        <b>平均成本：</b> ${format(avg, 4)} 元/股
    `;
}

function clearAll() {
    document.getElementById("shares").value = "";
    document.getElementById("price").value = "";
    document.getElementById("result").innerHTML = "";
}
</script>

</body>
</html>
